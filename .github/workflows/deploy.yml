name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    outputs:
      pages_enabled: ${{ steps.pages-status.outputs.enabled }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      - name: Detect Pages availability
        id: pages-status
        run: echo "enabled=${{ steps.pages.outcome == 'success' }}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
